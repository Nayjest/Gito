name: Tests

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:  # to allow testing from forks
    branches: [ "main" ]
  workflow_call:  # for triggering from pypi-release.yml
    secrets:
      LLM_API_KEY:
        required: false # or true if you always need it

jobs:
  build:
    # Do not collapse to only contains(head_commit.message): on pull_request / workflow_call head_commit
    # is absent; GitHub short-circuits || so .message is never evaluated unless event_name is push.
    if: "github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v6
      with:
        # Default ref for the event (merge commit for pull_request). Fork PRs run without base-repo secrets.
        #
        # ⚠️ SECURITY (esp. if you ever switch back to pull_request_target + PR head ref): that pattern
        # exposes secrets to fork code. Mitigate by:
        #   1. Requiring approval for running fork pull request workflows from all external contributors
        #      (Settings → Actions → General → Approval for running fork pull request workflows from contributors)
        #   2. Reviewing PRs for secret exfiltration and other malicious code before approving workflow runs.
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        pip install poetry
        poetry install
        echo "$(poetry env info --path)/bin" >> $GITHUB_PATH
    - name: Test with pytest
      if: matrix.python-version != '3.13'
      env:
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        LLM_API_TYPE: openai
        MODEL: "gpt-5.2"
      run: |
        pytest
    - name: Test with pytest +coverage
      if: matrix.python-version == '3.13'
      env:
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        LLM_API_TYPE: openai
        MODEL: "gpt-5.2"
      run: |
        pytest --cov=gito --cov-report=xml
    - name: Generate coverage badge
      if: matrix.python-version == '3.13' && github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        pip install genbadge[coverage]
        genbadge coverage -i coverage.xml -o coverage.svg
    - name: Validate coverage badge output
      if: matrix.python-version == '3.13' && github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        python3 <<'PY'
        import os, sys
        p = "coverage.svg"
        if not os.path.isfile(p):
            sys.exit("coverage.svg missing")
        n = os.path.getsize(p)
        if n < 120:
            sys.exit(f"coverage.svg too small ({n} bytes), genbadge likely failed silently")
        with open(p, "rb") as f:
            head = f.read(4096)
        if b"<svg" not in head.lower():
            sys.exit("coverage.svg does not start with an SVG document")
        PY
    - name: Upload coverage badge artifact
      if: success() && matrix.python-version == '3.13' && github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-badge
        path: coverage.svg
        if-no-files-found: error
        retention-days: 1

  # Isolated job: no checkout of main, no push from PRs — token write only to publish orphan branch.
  update-coverage-badge:
    needs: build
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && needs.build.result == 'success'
      && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: coverage-badge
        path: badge
    - name: Push coverage.svg to orphan branch coverage-badge
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -e
        gh auth setup-git
        mkdir -p /tmp/coverage-badge-publish
        cd /tmp/coverage-badge-publish
        git init
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        cp "${GITHUB_WORKSPACE}/badge/coverage.svg" .
        git add coverage.svg
        git commit -m "Update coverage badge [skip ci]"
        git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
        git push -f origin HEAD:coverage-badge
