name: Tests

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request_target:  # to allow testing from forks
    branches: [ "main" ]
  workflow_call:  # for triggering from pypi-release.yml
    secrets:
      LLM_API_KEY:
        required: false # or true if you always need it

jobs:
  build:
    # Do not collapse to only contains(head_commit.message): on pull_request / workflow_call head_commit
    # is absent; GitHub short-circuits || so .message is never evaluated unless event_name is push.
    if: "github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v6
      with:
        # Default ref for the event (merge commit for pull_request). Fork PRs run without base-repo secrets.
        #
        # ⚠️ SECURITY (esp. if you ever switch back to pull_request_target + PR head ref): that pattern
        # exposes secrets to fork code. Mitigate by:
        #   1. Requiring approval for running fork pull request workflows from all external contributors
        #      (Settings → Actions → General → Approval for running fork pull request workflows from contributors)
        #   2. Reviewing PRs for secret exfiltration and other malicious code before approving workflow runs.
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        pip install poetry
        poetry install
        echo "$(poetry env info --path)/bin" >> $GITHUB_PATH
    # Intentionally split into 4 steps: on pull_request_target we run without secrets,
    # and on trusted events we run with secrets. This avoids brittle inline env conditionals.
    - name: Test with pytest (fork PR - no secrets)
      if: matrix.python-version != '3.13' && github.event_name == 'pull_request_target'
      run: |
        pytest
    - name: Test with pytest (trusted - with secrets)
      if: matrix.python-version != '3.13' && github.event_name != 'pull_request_target'
      env:
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        LLM_API_TYPE: openai
        MODEL: "gpt-5.2"
      run: |
        pytest
    - name: Test with pytest +coverage (fork PR - no secrets)
      if: matrix.python-version == '3.13' && github.event_name == 'pull_request_target'
      run: |
        pytest --cov=gito --cov-report=xml
    - name: Test with pytest +coverage (trusted - with secrets)
      if: matrix.python-version == '3.13' && github.event_name != 'pull_request_target'
      env:
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        LLM_API_TYPE: openai
        MODEL: "gpt-5.2"
      run: |
        pytest --cov=gito --cov-report=xml
    - name: Generate coverage badge
      if: matrix.python-version == '3.13' && github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        pip install genbadge[coverage]
        genbadge coverage -i coverage.xml -o coverage.svg
    - name: Validate coverage badge output
      if: matrix.python-version == '3.13' && github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        f=coverage.svg
        s=$(wc -c < "$f" 2>/dev/null) || s=0
        [ "$s" -ge 120 ] || { echo "$f missing or too small ($s B)"; exit 1; }
        head -c 4096 "$f" | grep -qiF '<svg' || { echo "$f: not an SVG"; exit 1; }
    - name: Upload coverage badge artifact
      if: success() && matrix.python-version == '3.13' && github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-badge
        path: coverage.svg
        if-no-files-found: error
        retention-days: 1

  # Isolated job: no checkout of main, no push from PRs — token write only to publish orphan branch.
  update-coverage-badge:
    needs: build
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && needs.build.result == 'success'
      && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        ref: coverage-badge
        fetch-depth: 1
        token: ${{ secrets.GITHUB_TOKEN }}
        # persist-credentials intentionally true (default) - git push relies on it
    - uses: actions/download-artifact@v4
      with:
        name: coverage-badge
        path: badge
    - name: Push coverage.svg to orphan branch coverage-badge
      run: |
        set -e
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        cp badge/coverage.svg coverage.svg
        git add coverage.svg
        git diff --cached --quiet || git commit -m "Update coverage badge [skip ci]"
        git push origin coverage-badge
