name: "CRACK: AI Code Reviewer"
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request number"
        required: true
jobs:
  review:
    runs-on: ubuntu-latest
    permissions: { contents: read, pull-requests: write } # 'write' for leaving the summary comment
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        # Checkout PR head to process actual changes (including forks).
        #
        # ⚠️ SECURITY: This exposes secrets to fork code. Mitigate by:
        #   1. Requiring approval for running fork pull request workflows from all external contributors
        #      (Settings → Actions → General → Approval for running fork pull request workflows from contributors)
        #   2. Reviewing PRs for secret exfiltration and other malicious code before approving workflow runs.
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with: { python-version: "3.13" }

    - name: Install CRACK
      run: |
        pip install poetry
        poetry install
        echo "$(poetry env info --path)/bin" >> $GITHUB_PATH

    - name: Run AI code review
      env:
        # OpenAI Setup:
        # LLM_API_TYPE: openai
        # LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        # MODEL: "gpt-4.1"
        LLM_API_TYPE: openai
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        MODEL: gpt-5.3-codex
        CRACK_DEBUG: "1"
        PR_NUMBER_FROM_WORKFLOW_DISPATCH: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        CRACK --verbose review
        # alternative way to capture PR base
        # CRACK --verbose review ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref && format(' --against="origin/{0}"', github.event.pull_request.base.ref) || '' }}
        CRACK github-comment

    - uses: actions/upload-artifact@v6
      with:
        name: CRACK-code-review-results
        path: |
          code-review-report.md
          code-review-report.json
